name: Deploy (Terraform + ECR + EC2)

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  APP_NAME: trading-mage-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      infra_changed: ${{ steps.filter.outputs.infra }}
      app_changed: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - 'basic_infra/**'
            app:
              - 'app/**'

      - name: Debug detected changes
        run: |
          echo "infra_changed='${{ steps.filter.outputs.infra }}'"
          echo "app_changed='${{ steps.filter.outputs.app }}'"

  terraform:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.infra_changed == 'true'
    outputs:
      ecr_repo_url: ${{ steps.tfout.outputs.ecr_repo_url }}
      ec2_ip: ${{ steps.tfout.outputs.ec2_ip }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: basic_infra/infrastructure
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: basic_infra/infrastructure
        env:
          TF_VAR_allowed_ssh_cidr: ${{ secrets.TF_VAR_ALLOWED_SSH_CIDR }}
          TF_VAR_tv_webhook_secret: ${{ secrets.TF_VAR_TV_WEBHOOK_SECRET }}
          TF_VAR_apca_api_key_id: ${{ secrets.TF_VAR_APCA_API_KEY_ID }}
          TF_VAR_apca_api_secret_key: ${{ secrets.TF_VAR_APCA_API_SECRET_KEY }}
          TF_VAR_apca_api_base_url: ${{ secrets.TF_VAR_APCA_API_BASE_URL }}
        run: terraform apply -auto-approve -input=false

      - name: Read Terraform outputs
        id: tfout
        working-directory: basic_infra/infrastructure
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          echo "ecr_repo_url=$(terraform output -raw ecr_repo_url)" >> "$GITHUB_OUTPUT"
          echo "ec2_ip=$(terraform output -json ec2_public_ips | jq -r '.[0]')" >> "$GITHUB_OUTPUT"

      - name: Debug Terraform outputs
        run: |
          echo "ECR URL='${{ steps.tfout.outputs.ecr_repo_url }}'"
          echo "EC2 IP='${{ steps.tfout.outputs.ec2_ip }}'"

  build_push_deploy:
    runs-on: ubuntu-latest
    needs: [changes, terraform]
    if: >
      always() &&
      (needs.changes.outputs.app_changed == 'true' || needs.changes.outputs.infra_changed == 'true') &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Debug job gating
        run: |
          echo "infra_changed='${{ needs.changes.outputs.infra_changed }}'"
          echo "app_changed='${{ needs.changes.outputs.app_changed }}'"
          echo "terraform_result='${{ needs.terraform.result }}'"

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (read outputs)
        working-directory: basic_infra/infrastructure
        run: terraform init -input=false

      - name: Read infra outputs (ECR + EC2 IP)
        id: infraout
        working-directory: basic_infra/infrastructure
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          echo "ecr_repo_url=$(terraform output -raw ecr_repo_url)" >> "$GITHUB_OUTPUT"
          echo "ec2_ip=$(terraform output -json ec2_public_ips | jq -r '.[0]')" >> "$GITHUB_OUTPUT"

      - name: Debug infra outputs
        run: |
          echo "ECR='${{ steps.infraout.outputs.ecr_repo_url }}'"
          echo "EC2_IP='${{ steps.infraout.outputs.ec2_ip }}'"

      - name: Build & Push image to ECR
        working-directory: app
        run: |
          set -euo pipefail

          ECR="${{ steps.infraout.outputs.ecr_repo_url }}"
          if [ -z "$ECR" ]; then
            echo "ERROR: ecr_repo_url is empty"
            exit 1
          fi

          IMAGE="$ECR:${IMAGE_TAG}"
          echo "Building image: $IMAGE"

          docker build --pull -t "$IMAGE" .
          docker push "$IMAGE"

          docker tag "$IMAGE" "$ECR:latest"
          docker push "$ECR:latest"

      - name: Deploy on EC2 (SSH)
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REPO_URL: ${{ steps.infraout.outputs.ecr_repo_url }}
        with:
          host: ${{ steps.infraout.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_SSH_KEY_PASSPHRASE }}
          envs: AWS_REGION,APP_NAME,ECR_REPO_URL,IMAGE_TAG
          script: |
            set -euo pipefail

            echo "APP_NAME=$APP_NAME"
            echo "ECR_REPO_URL=$ECR_REPO_URL"
            echo "IMAGE_TAG=$IMAGE_TAG"

            if ! command -v docker-credential-ecr-login >/dev/null 2>&1; then
              echo "ERROR: docker-credential-ecr-login not installed on host (user_data likely didn't run on this instance)."
              echo "Either replace the instance or install amazon-ecr-credential-helper once."
              exit 1
            fi

            if [ ! -f "/etc/systemd/system/${APP_NAME}.service" ]; then
              echo "ERROR: /etc/systemd/system/${APP_NAME}.service not found (user_data may not have run)."
              sudo ls -lah /etc/systemd/system | grep -E 'webhook|tv|mage|trading' || true
              exit 1
            fi

            echo "Updating /etc/trading-mage-image.env to IMAGE_TAG=${IMAGE_TAG}"
            echo "IMAGE_TAG=${IMAGE_TAG}" | sudo tee /etc/trading-mage-image.env >/dev/null
            sudo chmod 600 /etc/trading-mage-image.env
            sudo chown root:root /etc/trading-mage-image.env

            echo "Pulling immutable image: ${ECR_REPO_URL}:${IMAGE_TAG}"
            sudo docker pull "${ECR_REPO_URL}:${IMAGE_TAG}"

            echo "---- systemd preflight ----"
            sudo systemctl is-enabled "${APP_NAME}.service" || true
            sudo systemctl is-active "${APP_NAME}.service" || true
            sudo ls -l "/etc/systemd/system/${APP_NAME}.service" || true

            sudo systemctl unmask "${APP_NAME}.service" || true

            if [ ! -s "/etc/systemd/system/${APP_NAME}.service" ]; then
              echo "ERROR: unit file missing/empty after unmask."
              sudo ls -lah /etc/systemd/system/${APP_NAME}.service || true
              exit 1
            fi

            sudo systemctl daemon-reload
            sudo systemctl enable "${APP_NAME}.service" || true
            sudo systemctl reset-failed "${APP_NAME}.service" || true

            echo "---- show EnvironmentFiles ----"
            sudo systemctl show "${APP_NAME}.service" -p EnvironmentFiles || true
            sudo cat /etc/trading-mage-image.env || true
            sudo cat /etc/trading-mage.env || true

            echo "---- restart service ----"
            if ! sudo systemctl restart "${APP_NAME}.service"; then
              echo "ERROR: restart failed. Dumping status + logs..."
              sudo systemctl --no-pager status "${APP_NAME}.service" -l || true
              sudo journalctl -u "${APP_NAME}.service" -n 120 --no-pager || true
              exit 1
            fi

            echo "---- verify container is running expected image ----"
            for i in $(seq 1 15); do
              RUNNING_IMAGE="$(sudo docker ps --filter "name=${APP_NAME}" --format "{{.Image}}" | head -n 1 || true)"
              if [ -n "$RUNNING_IMAGE" ]; then
                break
              fi
              echo "Waiting for container '${APP_NAME}' to appear... ($i/15)"
              sleep 1
            done

            sudo docker ps --filter "name=${APP_NAME}" --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"

            if [ -z "$RUNNING_IMAGE" ]; then
              echo "ERROR: container '${APP_NAME}' not running after restart"
              sudo systemctl --no-pager status "${APP_NAME}.service" -l || true
              sudo journalctl -u "${APP_NAME}.service" -n 120 --no-pager || true
              sudo docker ps -a --filter "name=${APP_NAME}" --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
              sudo docker logs "${APP_NAME}" --tail 120 || true
              exit 1
            fi

            echo "RUNNING_IMAGE=$RUNNING_IMAGE"
            if [ "$RUNNING_IMAGE" != "${ECR_REPO_URL}:${IMAGE_TAG}" ]; then
              echo "ERROR: expected ${ECR_REPO_URL}:${IMAGE_TAG} but running $RUNNING_IMAGE"
              exit 1
            fi

            echo "OK: running expected image tag"

            sudo systemctl --no-pager status "${APP_NAME}.service" -l
            sudo nginx -t
            sudo systemctl reload nginx